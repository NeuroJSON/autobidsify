name: Test Autobidsify

on: [push]

jobs:
  # ============================================================
  # JOB 1: Run unit tests
  # ============================================================
  test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false    # keep running other versions if one fails
      matrix:
        # Only test versions listed in pyproject.toml classifiers.
        # 3.14 is alpha and unstable on Actions; 3.8 and 3.9 are EOL.
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          # -e (editable) is required for flat layout so that
          # "import autobidsify" resolves to the source tree,
          # not a stale copy in site-packages.
          pip install -e ".[dev]"

      - name: Verify package is importable
        run: python -c "import autobidsify; print('import OK')"

      # Use pytest (not unittest discover) because all test files
      # use pytest fixtures, parametrize, and assertion rewriting.
      # pytest reads [tool.pytest.ini_options] from pyproject.toml:
      #   testpaths = ["tests"]
      #   addopts   = "-v --tb=short"
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=autobidsify \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

  # ============================================================
  # JOB 2: Build and deploy to PyPI
  # Only runs after ALL test matrix jobs pass.
  # ============================================================
  deploy:
    runs-on: ubuntu-22.04
    needs: test    # deploy only if test job succeeds
    outputs:
      uploaded: ${{ steps.upload_flag.outputs.uploaded }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: Set up Python for build
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build setuptools

      # Build both wheel (.whl) and source distribution (.tar.gz)
      # Output goes to dist/
      - name: Build wheel and sdist
        run: python -m build

      - name: Check if version already exists on PyPI
        id: perform_pypi_upload_check
        shell: bash
        run: $GITHUB_WORKSPACE/.github/check-pypi-upload.sh

      # Only upload if:
      #   1. Pushed by fangq or yiyiliu-rose
      #   2. Version not yet on PyPI (check script output)
      #   3. Not a pull request
      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: |
          (github.actor == 'fangq' || github.actor == 'yiyiliu-rose') &&
          steps.perform_pypi_upload_check.outputs.perform_pypi_upload == 1 &&
          github.event_name != 'pull_request'
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          verify_metadata: false
          verbose: true
          skip_existing: true

      # Record whether an upload actually happened, so the desktop-app builds
      # (same repo now) only rebuild when a new version was really published.
      # Same conditions as the Upload step above.
      - name: Set upload flag
        id: upload_flag
        if: always()
        shell: bash
        run: |
          if [ "${{ github.actor }}" = "fangq" -o "${{ github.actor }}" = "yiyiliu-rose" ] \
             && [ "${{ steps.perform_pypi_upload_check.outputs.perform_pypi_upload }}" = "1" ] \
             && [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "uploaded=true" >> "$GITHUB_OUTPUT"
          else
            echo "uploaded=false" >> "$GITHUB_OUTPUT"
          fi
  # ============================================================
  # JOB 3: Rebuild the Full desktop app after a real PyPI upload
  # Calls the reusable full_release workflow only when deploy actually
  # published a new version (uploaded == true).
  # ============================================================
  rebuild-full:
    needs: deploy
    if: needs.deploy.outputs.uploaded == 'true'
    uses: ./.github/workflows/full_release.yml
    permissions:
      contents: write
    secrets: inherit
